<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ennie Support Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }
  .header { background: #1d1d1f; color: white; padding: 18px 32px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header span { opacity: 0.45; font-size: 13px; margin-left: 4px; }
  .container { max-width: 900px; margin: 32px auto; padding: 0 20px; }
  .search-box { background: white; border-radius: 14px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 20px; }
  .search-row { display: flex; gap: 10px; }
  input[type=email] { flex: 1; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
  input[type=email]:focus { border-color: #0066cc; }
  button { padding: 12px 22px; background: #0066cc; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  button:hover { background: #0052a3; }
  .hint { margin-top: 8px; font-size: 12px; color: #aaa; }

  .loading { text-align: center; padding: 48px; color: #999; }
  .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #e0e0e0; border-top-color: #0066cc; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .results { display: none; }
  .person-card { background: white; border-radius: 14px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 14px; display: flex; align-items: center; gap: 16px; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .person-info h2 { font-size: 18px; font-weight: 700; }
  .person-info p { color: #999; font-size: 13px; margin-top: 2px; }
  .platform { background: white; border-radius: 14px; padding: 22px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 14px; }
  .platform-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f2f2f2; }
  .icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .kajabi-color { background: #fff3e0; }
  .eb-color { background: #fce4ec; }
  .kl-color { background: #e8eaf6; }
  .platform-name { font-size: 15px; font-weight: 700; }
  .badge { margin-left: auto; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
  .badge.yes { background: #e6f4ea; color: #1e7e34; }
  .badge.no { background: #f5f5f5; color: #999; }
  .field { display: flex; align-items: flex-start; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #fafafa; }
  .field:last-child { border: none; }
  .fl { color: #999; min-width: 120px; flex-shrink: 0; }
  .fv { color: #1d1d1f; font-weight: 500; }
  .order { background: #f8f9fa; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .order:last-child { margin-bottom: 0; }
  .order-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .order-meta { font-size: 12px; color: #777; display: flex; gap: 12px; flex-wrap: wrap; }
  .status-pill { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .status-placed { background: #e6f4ea; color: #1e7e34; }
  .status-refunded { background: #fff3e0; color: #e65100; }
  .status-cancelled { background: #fce4ec; color: #c62828; }
  .status-default { background: #f5f5f5; color: #666; }
  .tag { display: inline-block; background: #f0f0f0; border-radius: 4px; padding: 2px 7px; font-size: 11px; margin: 2px 2px 0 0; }
  .empty { color: #bbb; font-size: 13px; }
  .error { color: #c0392b; font-size: 13px; background: #fef9f9; padding: 12px; border-radius: 8px; }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 Ennie Support Dashboard</h1>
  <span>Contact lookup</span>
</div>
<div class="container">
  <div class="search-box">
    <div class="search-row">
      <input type="email" id="query" placeholder="Email address..." onkeydown="if(event.key==='Enter')lookup()">
      <button onclick="lookup()">Look up</button>
    </div>
    <p class="hint">Searches Kajabi, Eventbrite, and Klaviyo</p>
  </div>
  <div class="loading" id="loading" style="display:none">
    <span class="spinner"></span> Looking up contact...
  </div>
  <div class="results" id="results"></div>
</div>

<script>
async function lookup() {
  const email = document.getElementById('query').value.trim();
  if (!email) return;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';

  try {
    const r = await fetch('/lookup?email=' + encodeURIComponent(email));
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').innerHTML = `<div class="error">${e.message}</div>`;
    document.getElementById('results').style.display = 'block';
  }
}

function statusClass(s) {
  if (s === 'placed') return 'status-placed';
  if (s === 'refunded') return 'status-refunded';
  if (s === 'cancelled') return 'status-cancelled';
  return 'status-default';
}

function render(data) {
  const el = document.getElementById('results');
  const k = data.kajabi;
  const eb = data.eventbrite;
  const kl = data.klaviyo;

  const name = k.name || kl.name || data.email;
  const initials = name.split(' ').map(w => w[0]||'').join('').toUpperCase().slice(0,2) || '?';

  let html = `
    <div class="person-card">
      <div class="avatar">${initials}</div>
      <div class="person-info">
        <h2>${name}</h2>
        <p>${data.email}</p>
      </div>
    </div>`;

  // Kajabi
  html += `<div class="platform">
    <div class="platform-header">
      <div class="icon kajabi-color">🎓</div>
      <span class="platform-name">Kajabi</span>
      <span class="badge ${k.found ? 'yes' : 'no'}">${k.found ? 'MEMBER' : 'NOT FOUND'}</span>
    </div>`;
  if (k.found) {
    html += `
      <div class="field"><span class="fl">Name</span><span class="fv">${k.name||'—'}</span></div>
      <div class="field"><span class="fl">Last active</span><span class="fv">${k.last_active||'—'}</span></div>
      <div class="field"><span class="fl">Logins</span><span class="fv">${k.logins||'—'}</span></div>
      <div class="field"><span class="fl">Offers</span><span class="fv">${k.offers&&k.offers.length ? k.offers.join(', ') : '<span class="empty">None found</span>'}</span></div>`;
    if (k.tags && k.tags.length) {
      html += `<div class="field"><span class="fl">Tags</span><span class="fv">${k.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</span></div>`;
    }
  } else {
    html += `<p class="empty">${k.summary||'No record found'}</p>`;
  }
  html += '</div>';

  // Eventbrite
  html += `<div class="platform">
    <div class="platform-header">
      <div class="icon eb-color">🎟️</div>
      <span class="platform-name">Eventbrite</span>
      <span class="badge ${eb.found ? 'yes' : 'no'}">${eb.found ? eb.orders.length+' ORDER'+(eb.orders.length!==1?'S':'') : 'NOT FOUND'}</span>
    </div>`;
  if (eb.found && eb.orders.length) {
    eb.orders.forEach(o => {
      html += `<div class="order">
        <div class="order-title">${o.event_name}</div>
        <div class="order-meta">
          <span>📅 ${o.event_date||'Unknown date'}</span>
          <span>🎫 ${o.ticket_type}</span>
          <span>Order #${o.order_id}</span>
          <span class="status-pill ${statusClass(o.status)}">${o.status}</span>
        </div>
      </div>`;
    });
  } else {
    html += `<p class="empty">${eb.summary||'No orders found'}</p>`;
  }
  html += '</div>';

  // Klaviyo
  html += `<div class="platform">
    <div class="platform-header">
      <div class="icon kl-color">📧</div>
      <span class="platform-name">Klaviyo</span>
      <span class="badge ${kl.found ? 'yes' : 'no'}">${kl.found ? 'SUBSCRIBER' : 'NOT FOUND'}</span>
    </div>`;
  if (kl.found) {
    html += `
      <div class="field"><span class="fl">Name</span><span class="fv">${kl.name||'—'}</span></div>
      <div class="field"><span class="fl">Subscribed</span><span class="fv">${kl.created||'—'}</span></div>
      <div class="field"><span class="fl">Lists</span><span class="fv">${kl.lists&&kl.lists.length ? kl.lists.join(', ') : '<span class="empty">None</span>'}</span></div>`;
  } else {
    html += `<p class="empty">${kl.summary||'Not subscribed'}</p>`;
  }
  html += '</div>';

  el.innerHTML = html;
}
</script>
</body>
</html>
