<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ennie Support{% endblock %} — Charlie Goldsmith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    .ennie-loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .ennie-loader-overlay.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .ennie-loader-anim {
      width: 180px;
      height: 158px;
    }
  </style>
</head>
<body>

<!-- Ennie Lottie loader -->
<div class="ennie-loader-overlay" id="ennie-loader">
  <div class="ennie-loader-anim" id="ennie-lottie"></div>
</div>
<script>
  (function() {
    var anim = lottie.loadAnimation({
      container: document.getElementById('ennie-lottie'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: '{{ url_for("static", filename="ennie-loader.json") }}'
    });
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('ennie-loader').classList.add('fade-out');
        setTimeout(function() { anim.destroy(); }, 700);
      }, 1800);
    });
  })();
</script>

{% if session.user %}
<nav class="glass-nav">
  <div class="nav-brand">
    <img src="{{ url_for('static', filename='ennie-logo.jpg') }}" alt="Ennie" class="nav-logo-img">
  </div>

  <div class="nav-links">
    <a href="{{ url_for('dashboard') }}"
       class="nav-link{% if request.endpoint == 'dashboard' %} active{% endif %}">
      Dashboard
    </a>
    <a href="{{ url_for('inbox_page') }}"
       class="nav-link{% if request.endpoint == 'inbox_page' %} active{% endif %}">
      Inbox
    </a>
    <a href="{{ url_for('escalations_page') }}"
       class="nav-link{% if request.endpoint == 'escalations_page' %} active{% endif %}">
      Escalations
    </a>
    <a href="{{ url_for('lookup_page') }}"
       class="nav-link{% if request.endpoint == 'lookup_page' %} active{% endif %}">
      Lookup
    </a>
  </div>

  <div class="nav-search">
    <input type="text" id="global-search" placeholder="Search emails…" autocomplete="off" spellcheck="false">
    <div id="search-results" class="search-dropdown"></div>
  </div>

  <div class="nav-user">
    <span class="user-name">{{ session.display_name }}</span>
    <a href="{{ url_for('logout') }}" class="nav-link logout">Sign out</a>
  </div>
</nav>
{% endif %}

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- Toast container -->
<div id="toast" class="toast"></div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
