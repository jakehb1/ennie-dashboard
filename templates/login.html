<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Ennie Support</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #000;
      overflow: hidden;
    }

    /* Ambient background orbs */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-gradient::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 70vw;
      height: 70vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 80, 220, 0.15) 0%, transparent 70%);
      animation: drift1 20s ease-in-out infinite;
    }
    .bg-gradient::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -15%;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 149, 0, 0.1) 0%, transparent 70%);
      animation: drift2 25s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10%, 15%) scale(1.1); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-8%, -10%) scale(1.05); }
    }

    /* Glass card */
    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(40px) saturate(150%);
      -webkit-backdrop-filter: blur(40px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow:
        0 0 0 0.5px rgba(255, 255, 255, 0.05) inset,
        0 32px 80px rgba(0, 0, 0, 0.5),
        0 2px 20px rgba(0, 0, 0, 0.3);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .logo-img {
      width: 160px;
      height: auto;
      margin: 0 auto 24px;
      display: block;
    }

    .login-card h1 {
      font-size: 26px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .login-card .subtitle {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 36px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    select, input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      outline: none;
      transition: all 0.25s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='rgba(255,255,255,0.3)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 16px center;
      padding-right: 40px;
      cursor: pointer;
    }

    select:focus, input:focus {
      border-color: rgba(255, 149, 0, 0.4);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(255, 149, 0, 0.08);
    }

    input::placeholder { color: rgba(255, 255, 255, 0.2); }
    select option { color: #1C1C1E; background: #fff; font-family: 'Inter', sans-serif; }

    .pin-input {
      text-align: center;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 16px;
      padding-left: 28px;
    }

    /* Sign in button */
    .btn-signin {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #FF9500 0%, #FF6B00 100%);
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-signin::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      border-radius: 14px;
    }
    .btn-signin:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255, 149, 0, 0.25);
    }
    .btn-signin:active {
      transform: translateY(0);
    }

    /* Error */
    .error-msg {
      background: rgba(255, 59, 48, 0.08);
      border: 1px solid rgba(255, 59, 48, 0.15);
      color: #FF6B6B;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    /* Skip link */
    .skip-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      transition: color 0.25s;
    }
    .skip-link:hover { color: rgba(255, 255, 255, 0.6); }

    /* Subtle divider */
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 24px 0 0;
    }
    /* Loader overlay */
    .ennie-loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ennie-loader-overlay.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .ennie-loader-anim {
      width: 180px;
      height: 158px;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

<!-- Ennie Lottie loader -->
<div class="ennie-loader-overlay" id="ennie-loader">
  <div class="ennie-loader-anim" id="ennie-lottie"></div>
</div>
<script>
  (function() {
    var anim = lottie.loadAnimation({
      container: document.getElementById('ennie-lottie'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: '/static/ennie-loader.json'
    });
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('ennie-loader').classList.add('fade-out');
        setTimeout(function() { anim.destroy(); }, 700);
      }, 1800);
    });
  })();
</script>

<div class="bg-gradient"></div>

<div class="login-card">
  <img src="/static/ennie-logo.jpg" alt="Ennie" class="logo-img">
  <p class="subtitle">Support Dashboard</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ url_for('login') }}">
    <div class="form-group">
      <label class="form-label" for="username">Who are you?</label>
      <select id="username" name="username" required>
        <option value="" disabled {% if not request.form.get('username') %}selected{% endif %}>Select your name…</option>
        <option value="jakeh" {% if request.form.get('username') == 'jakeh' %}selected{% endif %}>Jakeh</option>
        <option value="casey" {% if request.form.get('username') == 'casey' %}selected{% endif %}>Casey</option>
        <option value="charlie" {% if request.form.get('username') == 'charlie' %}selected{% endif %}>Charlie</option>
        <option value="kara" {% if request.form.get('username') == 'kara' %}selected{% endif %}>Kara</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="pin">PIN</label>
      <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4"
             id="pin" name="pin"
             class="pin-input"
             placeholder="••••"
             autocomplete="off" required>
    </div>
    <button type="submit" class="btn-signin">Sign In</button>
  </form>

  <div class="divider"></div>
  <a href="/support" class="skip-link">Support Emails →</a>
</div>
</body>
</html>
